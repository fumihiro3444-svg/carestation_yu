<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf9f4"/>
      <stop offset="100%" stop-color="#f5ece4"/>
    </linearGradient>
    <linearGradient id="cardGradBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef6f0"/>
      <stop offset="100%" stop-color="#dcebe1"/>
    </linearGradient>
    <linearGradient id="cardGradFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fdf9f4"/>
    </linearGradient>
    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a8c6c"/>
      <stop offset="100%" stop-color="#4a7c5e"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c07a50"/>
      <stop offset="100%" stop-color="#a8663f"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- soft decorative circles -->
  <circle cx="670" cy="80" r="90" fill="#4a7c5e" opacity="0.06"/>
  <circle cx="90" cy="390" r="110" fill="#c07a50" opacity="0.06"/>
  <circle cx="90" cy="80" r="46" fill="#6a9e7e" opacity="0.08"/>

  <!-- gentle horizon / Aso motif -->
  <path d="M0,350 Q120,315 220,345 Q300,315 380,345 Q460,315 560,345 Q660,318 760,345 L800,350 L800,450 L0,450 Z"
        fill="#e6f0ea" opacity="0.6"/>

  <!-- calendar chip, August -->
  <g transform="translate(70,60)">
    <rect x="0" y="0" width="110" height="78" rx="12" fill="#ffffff" stroke="#ddd0bc" stroke-width="1.5"/>
    <rect x="0" y="0" width="110" height="26" rx="12" fill="#4a7c5e"/>
    <rect x="0" y="14" width="110" height="12" fill="#4a7c5e"/>
    <text x="55" y="55" font-family="Shippori Mincho, serif" font-size="28" font-weight="700" fill="#c07a50" text-anchor="middle">8</text>
    <text x="55" y="69" font-family="Zen Kaku Gothic New, sans-serif" font-size="9" letter-spacing="1.5" fill="#8a7560" text-anchor="middle">AUGUST</text>
  </g>

  <!-- back card (slightly behind, offset), vertical -->
  <g transform="translate(430,55) rotate(-6)">
    <rect x="0" y="0" width="200" height="320" rx="16" fill="url(#cardGradBack)" stroke="#c9dccf" stroke-width="2"/>
  </g>

  <!-- shadow for front card -->
  <ellipse cx="520" cy="400" rx="140" ry="16" fill="#2e2820" opacity="0.07"/>

  <!-- front card: the certificate itself, vertical (Aso-city style) -->
  <g transform="translate(420,70) rotate(3)">
    <rect x="0" y="0" width="200" height="320" rx="16" fill="url(#cardGradFront)" stroke="#ddd0bc" stroke-width="2.5"/>

    <!-- top color stripe -->
    <rect x="0" y="0" width="200" height="30" rx="16" fill="url(#stripeGrad)"/>
    <rect x="0" y="16" width="200" height="14" fill="url(#stripeGrad)"/>

    <!-- abstracted text lines (field impressions, top area) -->
    <rect x="20" y="50" width="110" height="9" rx="4.5" fill="#c9bda6"/>
    <rect x="20" y="70" width="150" height="8" rx="4" fill="#e6dccb"/>
    <rect x="20" y="88" width="130" height="8" rx="4" fill="#e6dccb"/>
    <rect x="20" y="106" width="150" height="8" rx="4" fill="#e6dccb"/>

    <!-- soft wave watermark pattern -->
    <path d="M16,230 Q46,220 76,230 T136,230 T184,230" stroke="#e6dccb" stroke-width="3" fill="none" opacity="0.55"/>
    <path d="M16,246 Q46,236 76,246 T136,246 T184,246" stroke="#e6dccb" stroke-width="3" fill="none" opacity="0.45"/>

    <!-- percentage badge, the focal point -->
    <circle cx="100" cy="180" r="48" fill="url(#badgeGrad)"/>
    <circle cx="100" cy="180" r="48" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.5"/>
    <text x="100" y="178" font-family="Shippori Mincho, serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <text x="100" y="200" font-family="Zen Kaku Gothic New, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">割</text>

    <!-- bottom corner mark, evokes an official seal without being literal -->
    <circle cx="168" cy="290" r="15" fill="none" stroke="#c9bda6" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- leaf accents -->
  <g opacity="0.5">
    <path d="M70,410 Q80,385 110,382 Q100,408 70,410 Z" fill="#6a9e7e"/>
    <path d="M700,60 Q712,39 738,37 Q728,60 700,60 Z" fill="#4a7c5e"/>
  </g>
</svg>
