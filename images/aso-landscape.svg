<ellipse cx="222" cy="136" rx="10" ry="5" fill="#fff" opacity="0.6"/>

<!-- 中岳（噴煙あり） -->
<path d="M272 222 Q300 155 318 140 Q336 155 365 222 Z" fill="#7a8870"/>
<path d="M292 222 Q312 165 318 145 Q325 165 345 222 Z" fill="#8a9880"/>
