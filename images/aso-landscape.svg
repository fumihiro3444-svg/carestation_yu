<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>阿蘇五岳と赤牛のイラスト</title>
<desc>阿蘇五岳と広大な草原、赤牛が草を食む温かみのある風景イラスト</desc>

<!-- 空 -->
<rect x="0" y="0" width="680" height="230" fill="#c8e8f8"/>

<!-- 太陽 -->
<circle cx="580" cy="65" r="35" fill="#fae898" opacity="0.9"/>
<circle cx="580" cy="65" r="27" fill="#fdf0b0"/>

<!-- 雲 -->
<ellipse cx="110" cy="75" rx="52" ry="20" fill="#fff" opacity="0.9"/>
<ellipse cx="148" cy="67" rx="38" ry="17" fill="#fff" opacity="0.9"/>
<ellipse cx="78" cy="72" rx="30" ry="15" fill="#fff" opacity="0.85"/>
<ellipse cx="390" cy="58" rx="44" ry="17" fill="#fff" opacity="0.8"/>
<ellipse cx="425" cy="51" rx="30" ry="14" fill="#fff" opacity="0.8"/>
<ellipse cx="362" cy="55" rx="27" ry="12" fill="#fff" opacity="0.75"/>

<!-- 外輪山（遠景） -->
<path d="M0 185 Q60 150 130 162 Q200 140 270 158 Q340 142 410 155 Q480 138 550 152 Q615 140 680 148 L680 220 L0 220 Z" fill="#8aaa78" opacity="0.5"/>

<!-- 阿蘇五岳 -->
