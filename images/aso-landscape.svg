<!-- タイトルテキスト -->
<rect x="28" y="18" width="210" height="52" rx="8" fill="#fff" opacity="0.78"/>
<text x="133" y="40" font-family="'Shippori Mincho', serif" font-size="13" fill="#4a7c59" text-anchor="middle" font-weight="600">阿蘇の大自然のなかで</text>
<text x="133" y="58" font-family="'Shippori Mincho', serif" font-size="12" fill="#6a9a72" text-anchor="middle">あなたの暮らしに寄り添います</text>

<!-- 五岳ラベル -->
<text x="100" y="240" font-family="sans-serif" font-size="9" fill="#5a6a50" text-anchor="middle" opacity="0.8">根子岳</text>
<text x="222" y="237" font-family="sans-serif" font-size="9" fill="#5a6a50" text-anchor="middle" opacity="0.8">高岳</text>
<text x="318" y="237" font-family="sans-serif" font-size="9" fill="#5a6a50" text-anchor="middle" opacity="0.8">中岳</text>
<text x="405" y="237" font-family="sans-serif" font-size="9" fill="#5a6a50" text-anchor="middle" opacity="0.8">烏帽子岳</text>
<text x="500" y="237" font-family="sans-serif" font-size="9" fill="#5a6a50" text-anchor="middle" opacity="0.8">杵島岳</text>

<!-- 装飾ライン -->
<line x1="40" y1="372" x2="640" y2="372" stroke="#4a7c59" stroke-width="1" opacity="0.25"/>
<text x="340" y="378" font-family="sans-serif" font-size="10" fill="#4a7c59" opacity="0.6" text-anchor="middle">ケアステーション ゆう　Care Station Yu — 内牧, 阿蘇</text>

</svg>
