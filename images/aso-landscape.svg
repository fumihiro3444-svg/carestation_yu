<ellipse cx="405" cy="151" rx="8" ry="4" fill="#fff" opacity="0.5"/>

<!-- 杵島岳 -->
<path d="M448 222 Q475 170 500 158 Q525 170 555 222 Z" fill="#6a8060"/>
<path d="M465 222 Q488 175 500 162 Q512 175 535 222 Z" fill="#7a9070"/>

<!-- 中景の草原 -->
<path d="M0 222 Q170 205 340 212 Q510 205 680 218 L680 290 L0 290 Z" fill="#7ab868"/>
<path d="M0 258 Q170 245 340 250 Q510 245 680 250 L680 290 L0 290 Z" fill="#6aaa58"/>

<!-- 手前の草原 -->
<rect x="0" y="288" width="680" height="92" fill="#5a9a48"/>
<path d="M0 288 Q34 281 68 288 Q102 281 136 288 Q170 281 204 288 Q238 281 272 288 Q306 281 340 288 Q374 281 408 288 Q442 281 476 288 Q510 281 544 288 Q578 281 612 288 Q646 281 680 288" fill="none" stroke="#4a8a38" stroke-width="2" opacity="0.4"/>

