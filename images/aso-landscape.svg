  <ellipse cx="10" cy="49" rx="5" ry="3" fill="#3a2010"/>
  <ellipse cx="22" cy="49" rx="5" ry="3" fill="#3a2010"/>
  <path d="M-30 12 Q-40 18 -37 30 L-35 34" fill="none" stroke="#783018" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="-35" cy="35" rx="4" ry="6" fill="#5a2010" transform="rotate(10,-35,35)"/>
  <path d="M52 30 Q55 38 52 42" fill="none" stroke="#5a9a48" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="52" cy="43" rx="6" ry="4" fill="#5a9a48"/>
