<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#FDF6EC"/>

  <!-- Soft decorative circles -->
  <circle cx="720" cy="80" r="70" fill="#F5E6D3" opacity="0.6"/>
  <circle cx="60" cy="520" r="90" fill="#E8F0E3" opacity="0.6"/>

  <!-- Room floor -->
  <rect x="0" y="480" width="800" height="120" fill="#E8DFD0"/>

  <!-- Back wall -->
  <rect x="0" y="0" width="800" height="480" fill="#FBF0E1"/>

  <!-- Window -->
  <rect x="70" y="90" width="150" height="150" rx="8" fill="#CDE7F0" stroke="#B5D6E0" stroke-width="6"/>
  <line x1="145" y1="90" x2="145" y2="240" stroke="#B5D6E0" stroke-width="6"/>
  <line x1="70" y1="165" x2="220" y2="165" stroke="#B5D6E0" stroke-width="6"/>
  <!-- Simple cloud outside window -->
  <ellipse cx="110" cy="130" rx="20" ry="12" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="130" cy="125" rx="24" ry="14" fill="#ffffff" opacity="0.8"/>

  <!-- Calendar on wall -->
  <rect x="620" y="80" width="110" height="120" rx="6" fill="#ffffff" stroke="#D8C9B0" stroke-width="4"/>
  <rect x="620" y="80" width="110" height="30" rx="6" fill="#E8A87C"/>
  <circle cx="645" cy="80" r="5" fill="#ffffff"/>
  <circle cx="705" cy="80" r="5" fill="#ffffff"/>
  <line x1="632" y1="130" x2="718" y2="130" stroke="#EDE3D3" stroke-width="4"/>
  <line x1="632" y1="150" x2="718" y2="150" stroke="#EDE3D3" stroke-width="4"/>
  <line x1="632" y1="170" x2="718" y2="170" stroke="#EDE3D3" stroke-width="4"/>
  <circle cx="675" cy="150" r="9" fill="#F2A65A" opacity="0.8"/>

  <!-- Small side table with tea -->
  <rect x="640" y="360" width="90" height="12" rx="4" fill="#C9A876"/>
  <rect x="648" y="372" width="8" height="60" fill="#C9A876"/>
  <rect x="710" y="372" width="8" height="60" fill="#C9A876"/>
  <ellipse cx="685" cy="352" rx="18" ry="8" fill="#ffffff" stroke="#E0D5C0" stroke-width="2"/>
  <rect x="672" y="340" width="26" height="14" rx="3" fill="#ffffff" stroke="#E0D5C0" stroke-width="2"/>

  <!-- Elderly person seated in armchair (left-center) -->
  <g>
    <!-- Armchair -->
    <rect x="150" y="330" width="180" height="150" rx="20" fill="#D98E73"/>
    <rect x="140" y="310" width="200" height="50" rx="20" fill="#E3A186"/>
    <rect x="140" y="330" width="35" height="130" rx="15" fill="#E3A186"/>
    <rect x="305" y="330" width="35" height="130" rx="15" fill="#E3A186"/>

    <!-- Body -->
    <ellipse cx="240" cy="400" rx="55" ry="65" fill="#8FAF9A"/>
    <!-- Legs -->
    <rect x="205" y="440" width="30" height="60" rx="12" fill="#5C7A68"/>
    <rect x="245" y="440" width="30" height="60" rx="12" fill="#5C7A68"/>
    <ellipse cx="220" cy="502" rx="20" ry="10" fill="#3E4A42"/>
    <ellipse cx="260" cy="502" rx="20" ry="10" fill="#3E4A42"/>

    <!-- Arms -->
    <ellipse cx="185" cy="390" rx="18" ry="45" fill="#8FAF9A" transform="rotate(-15 185 390)"/>
    <ellipse cx="295" cy="390" rx="18" ry="45" fill="#8FAF9A" transform="rotate(15 295 390)"/>
    <!-- Hands -->
    <circle cx="175" cy="425" r="14" fill="#F2C9A0"/>
    <circle cx="305" cy="425" r="14" fill="#F2C9A0"/>

    <!-- Head -->
    <circle cx="240" cy="320" r="42" fill="#F2C9A0"/>
    <!-- Gray hair -->
    <path d="M 200 310 Q 200 275 240 272 Q 280 275 280 310 Q 275 290 240 288 Q 205 290 200 310 Z" fill="#D9D3C8"/>
    <path d="M198 305 Q195 330 205 340" stroke="#D9D3C8" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M282 305 Q285 330 275 340" stroke="#D9D3C8" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Face -->
    <circle cx="225" cy="320" r="3.5" fill="#5A4A42"/>
    <circle cx="255" cy="320" r="3.5" fill="#5A4A42"/>
    <path d="M222 338 Q240 348 258 338" stroke="#5A4A42" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M215 308 Q225 302 233 306" stroke="#B0A090" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M247 306 Q255 302 265 308" stroke="#B0A090" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Blanket over knees -->
    <path d="M195 445 Q240 425 285 445 L285 480 Q240 470 195 480 Z" fill="#C9DCCF"/>
  </g>

  <!-- Care manager kneeling, notebook in hand (right side) -->
  <g>
    <!-- Body / cardigan -->
    <path d="M480 420 Q470 370 510 355 Q550 340 590 355 Q615 370 600 420 L600 470 Q540 480 480 470 Z" fill="#6B8FA3"/>

    <!-- Legs kneeling -->
    <path d="M495 460 Q490 490 520 500 L560 500 Q590 490 585 460 Z" fill="#4A6478"/>
    <ellipse cx="500" cy="500" rx="22" ry="10" fill="#3A4F5C"/>
    <ellipse cx="580" cy="500" rx="22" ry="10" fill="#3A4F5C"/>

    <!-- Arm holding clipboard -->
    <ellipse cx="470" cy="410" rx="16" ry="40" fill="#6B8FA3" transform="rotate(20 470 410)"/>
    <ellipse cx="605" cy="400" rx="16" ry="42" fill="#6B8FA3" transform="rotate(-25 605 400)"/>
    <circle cx="450" cy="435" r="13" fill="#F2C9A0"/>
    <circle cx="615" cy="365" r="13" fill="#F2C9A0"/>

    <!-- Head -->
    <circle cx="540" cy="330" r="40" fill="#F2C9A0"/>
    <!-- Hair -->
    <path d="M500 322 Q498 285 540 282 Q582 285 580 322 Q560 300 540 300 Q520 300 500 322 Z" fill="#4A3B33"/>
    <path d="M500 320 Q495 340 500 355 L512 355 Q505 335 508 320 Z" fill="#4A3B33"/>
    <path d="M580 320 Q585 340 580 355 L568 355 Q575 335 572 320 Z" fill="#4A3B33"/>
    <!-- Face -->
    <circle cx="525" cy="330" r="3.5" fill="#5A4A42"/>
    <circle cx="555" cy="330" r="3.5" fill="#5A4A42"/>
    <path d="M520 345 Q540 355 560 345" stroke="#5A4A42" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="510" cy="340" r="6" fill="#F2A6A0" opacity="0.5"/>
    <circle cx="570" cy="340" r="6" fill="#F2A6A0" opacity="0.5"/>

    <!-- Name badge -->
    <rect x="555" y="395" width="30" height="18" rx="3" fill="#ffffff" stroke="#4A6478" stroke-width="1.5"/>

    <!-- Clipboard / notebook -->
    <rect x="420" y="415" width="70" height="90" rx="6" fill="#ffffff" stroke="#B8956A" stroke-width="4"/>
    <rect x="440" y="405" width="30" height="14" rx="4" fill="#B8956A"/>
    <line x1="432" y1="440" x2="478" y2="440" stroke="#D8C9B0" stroke-width="3"/>
    <line x1="432" y1="455" x2="478" y2="455" stroke="#D8C9B0" stroke-width="3"/>
    <line x1="432" y1="470" x2="470" y2="470" stroke="#D8C9B0" stroke-width="3"/>
    <path d="M440 485 L450 493 L468 475" stroke="#8FAF9A" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Speech / thought bubble showing check items -->
  <g>
    <rect x="330" y="120" width="230" height="130" rx="24" fill="#ffffff" stroke="#E3C9A8" stroke-width="4"/>
    <path d="M400 248 L385 275 L425 250 Z" fill="#ffffff" stroke="#E3C9A8" stroke-width="4"/>

    <!-- checklist rows -->
    <rect x="355" y="145" width="20" height="20" rx="5" fill="none" stroke="#8FAF9A" stroke-width="3"/>
    <path d="M359 155 L364 161 L372 148" stroke="#8FAF9A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="390" y="161" font-family="sans-serif" font-size="17" fill="#5A4A42">体調の変化</text>

    <rect x="355" y="178" width="20" height="20" rx="5" fill="none" stroke="#E8A87C" stroke-width="3"/>
    <path d="M359 188 L364 194 L372 181" stroke="#E8A87C" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="390" y="194" font-family="sans-serif" font-size="17" fill="#5A4A42">サービスの様子</text>

    <rect x="355" y="211" width="20" height="20" rx="5" fill="none" stroke="#6B8FA3" stroke-width="3"/>
    <text x="390" y="227" font-family="sans-serif" font-size="17" fill="#5A4A42">ご本人・ご家族の声</text>
  </g>

  <!-- Title label at bottom -->
  <g>
    <rect x="150" y="10" width="500" height="78" rx="30" fill="#8FAF9A"/>
    <text x="400" y="38" font-family="sans-serif" font-size="21" font-weight="bold" fill="#ffffff" text-anchor="middle">サービスが始まった後、ケアマネは何をしているの？</text>
    <text x="400" y="68" font-family="sans-serif" font-size="21" font-weight="bold" fill="#ffffff" text-anchor="middle">（モニタリング編）</text>
  </g>
</svg>
