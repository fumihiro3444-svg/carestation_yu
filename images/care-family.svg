<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" font-family="'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF2F8"/>
      <stop offset="100%" stop-color="#DDE4F0"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4C9B8"/>
      <stop offset="100%" stop-color="#C0B090"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#B8C8E8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#B8C8E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="skinElder" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#F0C090"/>
      <stop offset="100%" stop-color="#D89860"/>
    </radialGradient>
    <radialGradient id="skinAdult" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#F2C090"/>
      <stop offset="100%" stop-color="#DCA068"/>
    </radialGradient>
    <!-- 霧・もやエフェクト -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="540" fill="url(#bgGrad)"/>
  <ellipse cx="400" cy="350" rx="380" ry="150" fill="url(#glowCenter)"/>

  <!-- 背景の薄い霧（不安感の表現） -->
  <ellipse cx="200" cy="200" rx="180" ry="120" fill="#C8D8F0" opacity="0.18" filter="url(#blur)"/>
  <ellipse cx="600" cy="180" rx="160" ry="110" fill="#C8D8F0" opacity="0.15" filter="url(#blur)"/>

  <!-- 床 -->
  <rect x="0" y="430" width="800" height="110" fill="url(#floorGrad)"/>
  <line x1="0" y1="440" x2="800" y2="440" stroke="#B0A080" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="458" x2="800" y2="458" stroke="#B0A080" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="475" x2="800" y2="475" stroke="#B0A080" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="430" x2="130" y2="540" stroke="#B0A080" stroke-width="1" opacity="0.35"/>
  <line x1="280" y1="430" x2="292" y2="540" stroke="#B0A080" stroke-width="1" opacity="0.35"/>
  <line x1="460" y1="430" x2="470" y2="540" stroke="#B0A080" stroke-width="1" opacity="0.35"/>
  <line x1="640" y1="430" x2="648" y2="540" stroke="#B0A080" stroke-width="1" opacity="0.35"/>

  <!-- ======== お母さん（中央、椅子に座る） ======== -->
  <!-- 椅子 -->
  <rect x="335" y="368" width="90" height="65" rx="4" fill="#7A6012" opacity="0.75"/>
  <rect x="323" y="348" width="114" height="24" rx="6" fill="#9A7818"/>
  <rect x="325" y="284" width="14" height="68" rx="4" fill="#7A6012"/>
  <rect x="411" y="284" width="14" height="68" rx="4" fill="#7A6012"/>
  <rect x="325" y="284" width="100" height="14" rx="4" fill="#9A7818"/>
  <rect x="337" y="430" width="10" height="22" rx="3" fill="#7A6012"/>
  <rect x="403" y="430" width="10" height="22" rx="3" fill="#7A6012"/>

  <!-- 体 -->
  <ellipse cx="380" cy="318" rx="38" ry="52" fill="#7986CB" opacity="0.82"/>
  <!-- 着物風の模様（薄く） -->
  <path d="M358 290 Q380 298 402 290" stroke="#9FA8DA" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M354 308 Q380 318 406 308" stroke="#9FA8DA" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M352 326 Q380 336 408 326" stroke="#9FA8DA" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- ひざかけ -->
  <ellipse cx="380" cy="368" rx="48" ry="16" fill="#5C6BC0" opacity="0.65"/>

  <!-- 腕（うなだれ気味、膝の上） -->
  <path d="M345 320 Q338 345 340 362" stroke="#7986CB" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M415 320 Q422 345 420 362" stroke="#7986CB" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- 手（膝の上で組んだ感じ） -->
  <ellipse cx="340" cy="364" rx="12" ry="9" fill="url(#skinElder)"/>
  <ellipse cx="420" cy="364" rx="12" ry="9" fill="url(#skinElder)"/>

  <!-- 頭（少しうつむき加減） -->
  <ellipse cx="380" cy="256" rx="35" ry="38" fill="url(#skinElder)" transform="rotate(5 380 256)"/>
  <!-- 白髪 -->
  <ellipse cx="378" cy="228" rx="30" ry="16" fill="#B8B8B8"/>
  <path d="M348 238 Q342 252 346 268" stroke="#B8B8B8" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M412 238 Q418 252 414 268" stroke="#B8B8B8" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- 頭頂部 -->
  <ellipse cx="378" cy="224" rx="22" ry="12" fill="#C8C8C8"/>
  <!-- シワ -->
  <path d="M358 255 Q362 262 358 268" stroke="#C0885A" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M402 255 Q398 262 402 268" stroke="#C0885A" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M364 246 Q378 244 392 246" stroke="#C0885A" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M362 240 Q378 238 394 240" stroke="#C0885A" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- 目（虚ろな感じ・遠くを見ている） -->
  <ellipse cx="368" cy="256" rx="6.5" ry="5.5" fill="#6B4C3B"/>
  <ellipse cx="393" cy="256" rx="6.5" ry="5.5" fill="#6B4C3B"/>
  <!-- 目の光（弱め・虚ろさ） -->
  <circle cx="366" cy="255" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="391" cy="255" r="1.5" fill="white" opacity="0.5"/>
  <!-- 眉（下がり） -->
  <path d="M360 246 Q368 244 375 247" stroke="#888" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M385 247 Q392 244 400 246" stroke="#888" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 口（少し開いた・ぼんやり） -->
  <path d="M369 272 Q380 273 391 272" stroke="#B08060" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- ほっぺ（薄く） -->
  <circle cx="357" cy="266" r="9" fill="#F0A090" opacity="0.25"/>
  <circle cx="403" cy="266" r="9" fill="#F0A090" opacity="0.25"/>

  <!-- 杖 -->
  <line x1="432" y1="358" x2="455" y2="430" stroke="#8B6914" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="433" cy="356" rx="13" ry="7" fill="#A07820" transform="rotate(-8 433 356)"/>

  <!-- ======== 頭上の「もや・記憶の断片」演出 ======== -->
  <!-- 思考の泡（ぼやけた、断片的な記憶） -->
  <!-- 泡の線 -->
  <line x1="380" y1="212" x2="375" y2="170" stroke="#9FA8DA" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6"/>
  <!-- メインの思考バブル -->
  <ellipse cx="375" cy="148" rx="80" ry="52" fill="white" opacity="0.7" filter="url(#softBlur)"/>
  <ellipse cx="375" cy="148" rx="80" ry="52" fill="none" stroke="#9FA8DA" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- 記憶の断片（断片的・ぼやけた内容） -->
  <!-- カレンダー（日付が不明確） -->
  <rect x="310" y="122" width="36" height="32" rx="3" fill="#C5CAE9" opacity="0.75"/>
  <rect x="310" y="122" width="36" height="8" rx="3" fill="#7986CB" opacity="0.8"/>
  <text x="328" y="129" text-anchor="middle" font-size="5" fill="white">?月</text>
  <!-- 格子（日付が？） -->
  <line x1="316" y1="133" x2="340" y2="133" stroke="#9FA8DA" stroke-width="0.8" opacity="0.7"/>
  <line x1="316" y1="139" x2="340" y2="139" stroke="#9FA8DA" stroke-width="0.8" opacity="0.7"/>
  <text x="318" y="138" font-size="6" fill="#5C6BC0" opacity="0.8">?</text>
  <text x="326" y="138" font-size="6" fill="#5C6BC0" opacity="0.8">?</text>
  <text x="334" y="138" font-size="6" fill="#5C6BC0" opacity="0.8">?</text>
  <text x="318" y="146" font-size="6" fill="#5C6BC0" opacity="0.8">?</text>
  <text x="326" y="146" font-size="6" fill="#5C6BC0" opacity="0.8">?</text>
  <text x="334" y="146" font-size="6" fill="#5C6BC0" opacity="0.8">?</text>

  <!-- 家のシルエット（ぼやけた） -->
  <g opacity="0.55" filter="url(#softBlur)">
    <polygon points="368,133 395,133 395,158 368,158" fill="#C5CAE9"/>
    <polygon points="363,134 400,134 381,120" fill="#9FA8DA"/>
    <rect x="376" y="146" width="10" height="12" fill="#7986CB"/>
  </g>

  <!-- 顔のシルエット（誰か思い出せない） -->
  <g opacity="0.5" filter="url(#softBlur)">
    <circle cx="425" cy="140" r="14" fill="#C5CAE9"/>
    <ellipse cx="425" cy="156" rx="12" ry="10" fill="#9FA8DA"/>
  </g>
  <!-- ？マーク -->
  <text x="424" y="144" text-anchor="middle" font-size="14" fill="#7986CB" opacity="0.7" font-weight="bold">?</text>

  <!-- ======== 娘（左） ======== -->
  <!-- 体 -->
  <ellipse cx="210" cy="328" rx="34" ry="52" fill="#E57373" opacity="0.85"/>
  <!-- 腕（お母さんの手をそっと握る） -->
  <path d="M242 328 Q290 340 338 364" stroke="#E57373" stroke-width="16" stroke-linecap="round" fill="none"/>
  <ellipse cx="340" cy="365" rx="12" ry="9" fill="url(#skinAdult)"/>
  <!-- 脚 -->
  <rect x="188" y="374" width="20" height="60" rx="9" fill="#4A235A"/>
  <rect x="213" y="374" width="20" height="60" rx="9" fill="#4A235A"/>
  <ellipse cx="198" cy="434" rx="15" ry="7" fill="#2C1444"/>
  <ellipse cx="223" cy="434" rx="15" ry="7" fill="#2C1444"/>
  <!-- 頭（少し前傾み） -->
  <ellipse cx="210" cy="253" rx="31" ry="34" fill="url(#skinAdult)" transform="rotate(8 210 253)"/>
  <!-- 髪 -->
  <ellipse cx="208" cy="235" rx="32" ry="18" fill="#2C1810"/>
  <path d="M178 245 Q174 285 182 318" stroke="#2C1810" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M240 244 Q248 280 240 315" stroke="#2C1810" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- 目（心配・眉を寄せる） -->
  <ellipse cx="199" cy="255" rx="6" ry="5.5" fill="#3D2B1A"/>
  <ellipse cx="221" cy="255" rx="6" ry="5.5" fill="#3D2B1A"/>
  <circle cx="201" cy="254" r="2" fill="white"/>
  <circle cx="223" cy="254" r="2" fill="white"/>
  <!-- 眉（ぐっと寄せた心配顔） -->
  <path d="M192 244 Q200 240 207 244" stroke="#5C4033" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M213 244 Q220 240 228 244" stroke="#5C4033" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 口（固く結んだ・悲しみ） -->
  <path d="M200 271 Q210 268 220 271" stroke="#A06050" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 涙（目尻） -->
  <ellipse cx="192" cy="260" r="3" fill="#90CAF9" opacity="0.7"/>
  <!-- ほっぺ -->
  <circle cx="191" cy="264" r="8" fill="#F48FB1" opacity="0.35"/>
  <circle cx="229" cy="264" r="8" fill="#F48FB1" opacity="0.35"/>

  <!-- ======== 息子（右） ======== -->
  <!-- 体 -->
  <ellipse cx="565" cy="325" rx="36" ry="54" fill="#42A5F5" opacity="0.85"/>
  <!-- 腕（お母さんの肩をそっと） -->
  <path d="M532 315 Q470 325 420 358" stroke="#42A5F5" stroke-width="16" stroke-linecap="round" fill="none"/>
  <ellipse cx="420" cy="360" rx="12" ry="9" fill="url(#skinAdult)"/>
  <!-- 脚 -->
  <rect x="542" y="373" width="22" height="60" rx="10" fill="#1565C0"/>
  <rect x="568" y="373" width="22" height="60" rx="10" fill="#1565C0"/>
  <ellipse cx="553" cy="433" rx="17" ry="8" fill="#0D47A1"/>
  <ellipse cx="579" cy="433" rx="17" ry="8" fill="#0D47A1"/>
  <!-- 頭（少し前傾み） -->
  <ellipse cx="565" cy="247" rx="33" ry="37" fill="url(#skinAdult)" transform="rotate(-6 565 247)"/>
  <!-- 髪（短め） -->
  <ellipse cx="565" cy="228" rx="33" ry="17" fill="#1A0F06"/>
  <ellipse cx="542" cy="238" rx="8" ry="14" fill="#1A0F06"/>
  <ellipse cx="588" cy="238" rx="8" ry="14" fill="#1A0F06"/>
  <!-- 目（心配・真剣） -->
  <ellipse cx="552" cy="250" rx="6" ry="5.5" fill="#3D2B1A"/>
  <ellipse cx="578" cy="250" rx="6" ry="5.5" fill="#3D2B1A"/>
  <circle cx="554" cy="249" r="2" fill="white"/>
  <circle cx="580" cy="249" r="2" fill="white"/>
  <!-- 眉（心配・寄せた） -->
  <path d="M545 239 Q553 236 560 240" stroke="#5C4033" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M570 240 Q577 236 585 239" stroke="#5C4033" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 口（真剣・固く） -->
  <path d="M553 268 Q565 265 577 268" stroke="#A06050" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- ほっぺ -->
  <circle cx="540" cy="260" r="8" fill="#F48FB1" opacity="0.28"/>
  <circle cx="590" cy="260" r="8" fill="#F48FB1" opacity="0.28"/>

  <!-- ======== 二人の「心配のサイン」演出 ======== -->
  <!-- 娘の頭上の吹き出し（心配の言葉） -->
  <ellipse cx="145" cy="188" rx="68" ry="40" fill="white" opacity="0.78"/>
  <ellipse cx="145" cy="188" rx="68" ry="40" fill="none" stroke="#E57373" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <polygon points="175,226 190,238 180,228" fill="white" opacity="0.78"/>
  <polygon points="175,226 190,238 180,228" fill="none" stroke="#E57373" stroke-width="1.5" opacity="0.7"/>
  <text x="145" y="182" text-anchor="middle" font-size="12" fill="#C62828" font-weight="bold">最近、忘れっぽい</text>
  <text x="145" y="200" text-anchor="middle" font-size="11" fill="#C62828">…大丈夫かな？</text>

  <!-- 息子の頭上の吹き出し -->
  <ellipse cx="660" cy="185" rx="72" ry="40" fill="white" opacity="0.78"/>
  <ellipse cx="660" cy="185" rx="72" ry="40" fill="none" stroke="#1976D2" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <polygon points="625,222 610,236 622,226" fill="white" opacity="0.78"/>
  <polygon points="625,222 610,236 622,226" fill="none" stroke="#1976D2" stroke-width="1.5" opacity="0.7"/>
  <text x="660" y="179" text-anchor="middle" font-size="12" fill="#1565C0" font-weight="bold">病院に行こうと</text>
  <text x="660" y="197" text-anchor="middle" font-size="11" fill="#1565C0">勧めるべきか…</text>

  <!-- ======== 温かい光の帯（それでも寄り添う） ======== -->
  <ellipse cx="390" cy="400" rx="230" ry="22" fill="none" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4"/>

  <!-- タイトル -->
  <text x="400" y="58" text-anchor="middle" font-size="21" font-weight="bold" fill="#37474F" letter-spacing="3">もしかして…？</text>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#546E7A" letter-spacing="2" opacity="0.85">認知症を心配する家族のそばに、専門家がいます</text>

  <!-- ラベル -->
  <text x="210" y="475" text-anchor="middle" font-size="13" fill="#C62828" letter-spacing="1">娘</text>
  <text x="380" y="478" text-anchor="middle" font-size="13" fill="#37474F" letter-spacing="1">お母さん</text>
  <text x="565" y="475" text-anchor="middle" font-size="13" fill="#1565C0" letter-spacing="1">息子</text>

  <!-- 底部メッセージ -->
  <text x="400" y="516" text-anchor="middle" font-size="12" fill="#546E7A" letter-spacing="2" opacity="0.85">ひとりで抱え込まないで、まずはご相談ください</text>
</svg>
