<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>ケアマネジャーと利用者・家族の相談場面のイラスト</title>
<desc>ケアマネジャーが高齢者とその家族と話し合っている温かみのある場面</desc>

<style>
  .wall { fill: #f0ebe0; }
  .floor { fill: #e8ddd0; }
  .table { fill: #c8a97a; }
  .table-top { fill: #d4b48a; }
  .doc { fill: #fff; stroke: #c8a97a; stroke-width: 1; }
  .window { fill: #d4eef0; stroke: #b0c8cc; stroke-width: 1.5; }
  .window-frame { fill: none; stroke: #b0c8cc; stroke-width: 1.5; }
  .curtain { fill: #e8c8b0; }
  .speech { fill: #fff; stroke: #4a7c59; stroke-width: 1.5; }
  .speech-text { font-family: 'Shippori Mincho', serif; font-size: 11px; fill: #4a7c59; }
  .label { font-family: sans-serif; font-size: 11px; fill: #6b8f72; text-anchor: middle; }
</style>

<!-- 背景 -->
<rect x="0" y="0" width="680" height="400" class="wall"/>
<rect x="0" y="280" width="680" height="120" class="floor"/>

<!-- 窓 -->
<rect x="60" y="60" width="110" height="90" rx="4" class="window"/>
<line x1="115" y1="60" x2="115" y2="150" class="window-frame"/>
<line x1="60" y1="105" x2="170" y2="105" class="window-frame"/>
<rect x="55" y="58" width="20" height="96" rx="2" class="curtain" opacity="0.7"/>
<rect x="155" y="58" width="20" height="96" rx="2" class="curtain" opacity="0.7"/>

<!-- 観葉植物 -->
<rect x="590" y="240" width="28" height="40" rx="4" fill="#c8a97a"/>
<ellipse cx="604" cy="235" rx="22" ry="18" fill="#4a7c59"/>
<ellipse cx="590" cy="225" rx="15" ry="12" fill="#4a7c59"/>
<ellipse cx="618" cy="228" rx="14" ry="11" fill="#4a7c59"/>
<ellipse cx="604" cy="215" rx="12" ry="10" fill="#3d6b4a"/>

<!-- テーブル -->
<rect x="210" y="255" width="280" height="12" rx="4" class="table-top"/>
<rect x="225" y="267" width="12" height="40" rx="3" class="table"/>
<rect x="463" y="267" width="12" height="40" rx="3" class="table"/>

<!-- 書類・ペン -->
<rect x="275" y="235" width="70" height="22" rx="2" class="doc"/>
<rect x="288" y="240" width="40" height="2" rx="1" fill="#ccc"/>
<rect x="288" y="245" width="30" height="2" rx="1" fill="#ccc"/>
<rect x="288" y="250" width="35" height="2" rx="1" fill="#ccc"/>
<rect x="350" y="232" width="5" height="20" rx="2" fill="#4a7c59" transform="rotate(-20,352,242)"/>

<!-- ケアマネジャー（左） -->
<rect x="163" y="260" width="16" height="45" rx="6" fill="#3a5a42"/>
<rect x="185" y="260" width="16" height="45" rx="6" fill="#3a5a42"/>
<ellipse cx="171" cy="307" rx="12" ry="6" fill="#2a3a2a"/>
<ellipse cx="193" cy="307" rx="12" ry="6" fill="#2a3a2a"/>
<rect x="155" y="195" width="54" height="68" rx="8" fill="#4a7c59"/>
<path d="M200 215 Q220 235 248 248" fill="none" stroke="#4a7c59" stroke-width="13" stroke-linecap="round"/>
<ellipse cx="252" cy="250" rx="8" ry="6" fill="#d4a476"/>
<rect x="174" y="183" width="16" height="18" rx="4" fill="#d4a476"/>
<ellipse cx="182" cy="172" rx="24" ry="26" fill="#d4a476"/>
<ellipse cx="182" cy="152" rx="24" ry="14" fill="#5a4030"/>
<rect x="158" y="155" width="10" height="25" rx="5" fill="#5a4030"/>
<rect x="196" y="155" width="10" height="25" rx="5" fill="#5a4030"/>
<ellipse cx="174" cy="172" rx="3" ry="3.5" fill="#fff"/>
<ellipse cx="190" cy="172" rx="3" ry="3.5" fill="#fff"/>
<circle cx="175" cy="173" r="1.8" fill="#3a2820"/>
<circle cx="191" cy="173" r="1.8" fill="#3a2820"/>
<path d="M170 167 Q174 165 178 167" fill="none" stroke="#5a4030" stroke-width="1.5" stroke-linecap="round"/>
<path d="M186 167 Q190 165 194 167" fill="none" stroke="#5a4030" stroke-width="1.5" stroke-linecap="round"/>
<path d="M175 180 Q182 185 189 180" fill="none" stroke="#c07850" stroke-width="1.5" stroke-linecap="round"/>

<!-- 高齢者（中央） -->
<rect x="303" y="262" width="14" height="42" rx="6" fill="#8090a8"/>
<rect x="323" y="262" width="14" height="42" rx="6" fill="#8090a8"/>
<ellipse cx="310" cy="306" rx="11" ry="5" fill="#2a3040"/>
<ellipse cx="330" cy="306" rx="11" ry="5" fill="#2a3040"/>
<rect x="295" y="200" width="50" height="65" rx="8" fill="#b0c0d8"/>
<path d="M342 258 Q347 250 347 308" fill="none" stroke="#a08060" stroke-width="4" stroke-linecap="round"/>
<ellipse cx="347" cy="248" rx="6" ry="4" fill="#a08060"/>
<rect x="312" y="188" width="14" height="18" rx="4" fill="#d4a070"/>
<ellipse cx="319" cy="177" rx="22" ry="24" fill="#d4a070"/>
<ellipse cx="319" cy="158" rx="22" ry="13" fill="#e0ddd8"/>
<rect x="297" y="160" width="9" height="22" rx="4" fill="#e0ddd8"/>
<rect x="313" y="160" width="9" height="22" rx="4" fill="#e0ddd8"/>
<ellipse cx="312" cy="177" rx="2.5" ry="3" fill="#fff"/>
<ellipse cx="326" cy="177" rx="2.5" ry="3" fill="#fff"/>
<circle cx="313" cy="178" r="1.5" fill="#3a2820"/>
<circle cx="327" cy="178" r="1.5" fill="#3a2820"/>
<path d="M308 172 Q312 170 316 172" fill="none" stroke="#8a7060" stroke-width="1.2" stroke-linecap="round"/>
<path d="M322 172 Q326 170 330 172" fill="none" stroke="#8a7060" stroke-width="1.2" stroke-linecap="round"/>
<path d="M313 184 Q319 189 325 184" fill="none" stroke="#b07850" stroke-width="1.5" stroke-linecap="round"/>

<!-- 家族（右） -->
<rect x="436" y="260" width="14" height="44" rx="6" fill="#b07060"/>
<rect x="456" y="260" width="14" height="44" rx="6" fill="#b07060"/>
<ellipse cx="443" cy="306" rx="11" ry="5" fill="#2a2030"/>
<ellipse cx="463" cy="306" rx="11" ry="5" fill="#2a2030"/>
<rect x="428" y="195" width="52" height="68" rx="8" fill="#d4907a"/>
<path d="M435 215 Q415 235 388 248" fill="none" stroke="#d4907a" stroke-width="13" stroke-linecap="round"/>
<ellipse cx="384" cy="250" rx="8" ry="6" fill="#e0b090"/>
<rect x="446" y="183" width="14" height="18" rx="4" fill="#e0b090"/>
<ellipse cx="453" cy="172" rx="22" ry="24" fill="#e0b090"/>
<ellipse cx="453" cy="153" rx="22" ry="13" fill="#4a3828"/>
<rect x="431" y="156" width="9" height="30" rx="4" fill="#4a3828"/>
<rect x="467" y="156" width="9" height="30" rx="4" fill="#4a3828"/>
<ellipse cx="446" cy="172" rx="2.5" ry="3" fill="#fff"/>
<ellipse cx="460" cy="172" rx="2.5" ry="3" fill="#fff"/>
<circle cx="447" cy="173" r="1.5" fill="#3a2820"/>
<circle cx="461" cy="173" r="1.5" fill="#3a2820"/>
<path d="M442 167 Q446 165 450 167" fill="none" stroke="#4a3828" stroke-width="1.2" stroke-linecap="round"/>
<path d="M456 167 Q460 165 464 167" fill="none" stroke="#4a3828" stroke-width="1.2" stroke-linecap="round"/>
<path d="M447 179 Q453 184 459 179" fill="none" stroke="#c08060" stroke-width="1.5" stroke-linecap="round"/>

<!-- 吹き出し（ケアマネ） -->
<rect x="88" y="100" width="148" height="44" rx="10" class="speech"/>
<polygon points="145,144 155,158 165,144" fill="#fff" stroke="#4a7c59" stroke-width="1.5" stroke-linejoin="round"/>
<polygon points="145,144 165,144 155,156" fill="#fff"/>
<text x="162" y="118" class="speech-text" text-anchor="middle">どんなことでも</text>
<text x="162" y="133" class="speech-text" text-anchor="middle">ご相談ください</text>

<!-- 吹き出し（家族） -->
<rect x="444" y="100" width="148" height="44" rx="10" class="speech"/>
<polygon points="497,144 507,158 517,144" fill="#fff" stroke="#4a7c59" stroke-width="1.5" stroke-linejoin="round"/>
<polygon points="497,144 517,144 507,156" fill="#fff"/>
<text x="518" y="118" class="speech-text" text-anchor="middle">父のことが</text>
<text x="518" y="133" class="speech-text" text-anchor="middle">心配で…</text>

<!-- ラベル -->
<text x="182" y="335" class="label">ケアマネジャー</text>
<text x="319" y="335" class="label">ご利用者さま</text>
<text x="453" y="335" class="label">ご家族</text>

<!-- 装飾ライン -->
<line x1="40" y1="380" x2="640" y2="380" stroke="#4a7c59" stroke-width="1" opacity="0.3"/>
<text x="340" y="395" font-family="sans-serif" font-size="11" fill="#4a7c59" opacity="0.7" text-anchor="middle">ケアステーション ゆう　居宅介護支援</text>

</svg>
