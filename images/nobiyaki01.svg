<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7c98e"/>
      <stop offset="45%" stop-color="#eda874"/>
      <stop offset="100%" stop-color="#d98a6b"/>
    </linearGradient>
    <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f3a3a"/>
      <stop offset="100%" stop-color="#2b2726"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff7b3d"/>
      <stop offset="60%" stop-color="#ffb14d"/>
      <stop offset="100%" stop-color="#fff1c2"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ff9a4d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff9a4d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="800" height="600" fill="url(#skyGrad)"/>

  <!-- sun -->
  <circle cx="620" cy="150" r="55" fill="#fff3d6" opacity="0.85"/>

  <!-- distant caldera ridge -->
  <path d="M0,300 L90,255 L170,290 L260,240 L340,275 L430,230 L520,270 L610,235 L700,265 L800,245 L800,320 L0,320 Z" fill="#8c6f66" opacity="0.55"/>

  <!-- mid hills -->
  <path d="M0,340 L120,300 L230,335 L360,290 L480,330 L600,300 L720,335 L800,310 L800,380 L0,380 Z" fill="#5c4a44" opacity="0.75"/>

  <!-- glow above burning area -->
  <ellipse cx="380" cy="430" rx="360" ry="140" fill="url(#glowGrad)"/>

  <!-- foreground burnt hillside -->
  <path d="M0,420 L100,395 L220,430 L340,385 L460,425 L580,390 L700,420 L800,400 L800,600 L0,600 Z" fill="url(#hillGrad)"/>

  <!-- flame line along the ridge -->
  <g>
    <path d="M20,418 Q60,388 100,400 Q130,378 160,398 Q190,370 220,395 Q250,368 280,392 Q310,365 340,388 Q370,362 400,390 Q430,368 460,392 Q490,365 520,388 Q550,368 580,392 Q610,372 640,395 Q670,378 700,398 Q730,385 760,405 Q780,392 800,405"
      fill="none" stroke="url(#flameGrad)" stroke-width="10" stroke-linecap="round"/>
    <!-- individual flame licks -->
    <g fill="url(#flameGrad)">
      <path d="M60,398 q6,-26 14,-4 q6,-20 12,0 q4,-14 10,2 q2,10 -6,12 q-4,6 -10,0 q-6,6 -10,-2 q-6,4 -10,-8 Z"/>
      <path d="M180,394 q6,-28 14,-4 q6,-22 12,0 q4,-16 10,2 q2,10 -6,12 q-4,6 -10,0 q-6,6 -10,-2 q-6,4 -10,-8 Z"/>
      <path d="M300,388 q6,-30 14,-4 q6,-24 12,0 q4,-16 10,2 q2,10 -6,12 q-4,6 -10,0 q-6,6 -10,-2 q-6,4 -10,-8 Z"/>
      <path d="M430,388 q6,-28 14,-4 q6,-22 12,0 q4,-16 10,2 q2,10 -6,12 q-4,6 -10,0 q-6,6 -10,-2 q-6,4 -10,-8 Z"/>
      <path d="M550,388 q6,-26 14,-4 q6,-20 12,0 q4,-14 10,2 q2,10 -6,12 q-4,6 -10,0 q-6,6 -10,-2 q-6,4 -10,-8 Z"/>
      <path d="M670,398 q6,-24 14,-4 q6,-18 12,0 q4,-13 10,2 q2,9 -6,11 q-4,6 -10,0 q-6,6 -10,-2 q-6,4 -10,-8 Z"/>
    </g>
  </g>

  <!-- smoke wisps -->
  <g fill="#f4ede2" opacity="0.35">
    <ellipse cx="150" cy="330" rx="40" ry="16"/>
    <ellipse cx="200" cy="305" rx="30" ry="12"/>
    <ellipse cx="480" cy="320" rx="46" ry="18"/>
    <ellipse cx="540" cy="290" rx="28" ry="11"/>
    <ellipse cx="650" cy="335" rx="34" ry="13"/>
  </g>

  <!-- title label -->
  <g>
    <rect x="185" y="20" width="430" height="58" rx="28" fill="#8FAF9A"/>
    <text x="400" y="57" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">阿蘇の春を告げる「野焼き」</text>
  </g>
</svg>
